<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 270" width="200" height="270">

  <!-- Background -->
  <rect width="200" height="270" fill="#1a1a2e" rx="16"/>

  <!-- ── Queen piece (gold) ─────────────────────────────────────────────── -->

  <!-- Crown body (below sheet) -->
  <path d="M 56,100 L 61,83 L 78,100 L 100,70 L 122,100 L 139,83 L 144,100 Z"
        fill="#f0efe8"/>

  <!-- Upper body -->
  <path d="M 56,100 L 62,120 L 138,120 L 144,100 Z" fill="#f0efe8"/>

  <!-- Waist -->
  <rect x="80" y="120" width="40" height="12" fill="#c9a84c"/>

  <!-- Skirt / lower body -->
  <path d="M 80,132 L 70,162 L 130,162 L 120,132 Z" fill="#c9a84c"/>

  <!-- Plinth -->
  <path d="M 65,162 L 135,162 L 142,182 L 58,182 Z" fill="#c9a84c"/>

  <!-- Base -->
  <rect x="50" y="182" width="100" height="13" rx="3" fill="#c9a84c"/>

  <!-- Foot -->
  <rect x="42" y="195" width="116" height="9"  rx="3" fill="#b8912e"/>

  <!-- ── Ghost sheet ─────────────────────────────────────────────────────── -->
  <!--
    Dome: cubic bezier from (50,168) over the top to (150,168).
    Bottom: 3 downward scallop bumps back to start.
    Peak of each bump (quadratic midpoint formula): y = (168+200)/2 = 184.
  -->
  <path d="
    M 50,168
    C 50,42 150,42 150,168
    Q 133,200 116,168
    Q 100,200  84,168
    Q 67,200   50,168
    Z
  " fill="#f0efe8" stroke="#d5d4cc" stroke-width="1.5"/>

  <!-- Left eye hole -->
  <ellipse cx="80"  cy="113" rx="14" ry="18" fill="#1a1a2e"/>

  <!-- Right eye hole -->
  <ellipse cx="120" cy="113" rx="14" ry="18" fill="#1a1a2e"/>

  <!-- Mouth hole -->
  <ellipse cx="100" cy="148" rx="12" ry="8"  fill="#1a1a2e"/>

  <!-- Crown balls (on top of sheet — white lumps showing the queen's crown underneath) -->
  <circle cx="100" cy="62" r="8"  fill="#f0efe8" stroke="#d5d4cc" stroke-width="1.5"/>
  <circle cx="78"  cy="72" r="6"  fill="#f0efe8" stroke="#d5d4cc" stroke-width="1.5"/>
  <circle cx="122" cy="72" r="6"  fill="#f0efe8" stroke="#d5d4cc" stroke-width="1.5"/>
  <circle cx="61"  cy="83" r="5"  fill="#f0efe8" stroke="#d5d4cc" stroke-width="1.5"/>
  <circle cx="139" cy="83" r="5"  fill="#f0efe8" stroke="#d5d4cc" stroke-width="1.5"/>

</svg>
